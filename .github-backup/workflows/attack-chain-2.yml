name: "Attack Chain 2: Cache Poisoning → False Negatives"

on:
  workflow_dispatch:

jobs:
  cache-poisoning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: "Step 1: Create vulnerable package.json"
        run: |
          mkdir -p chain2-poisoned-cache
          cat > chain2-poisoned-cache/package.json << 'PKG'
          {
            "name": "vulnerable-app",
            "version": "1.0.0",
            "dependencies": {
              "lodash": "4.17.0",
              "express": "3.11.0"
            }
          }
          PKG
          cat chain2-poisoned-cache/package.json
      
      - name: "Step 2: Demonstrate cache permission vulnerability (0644)"
        run: |
          mkdir -p chain2-poisoned-cache/.npm-cache
          
          # Create a cache file with world-readable permissions (0644)
          touch chain2-poisoned-cache/.npm-cache/test.resolve.npm
          chmod 644 chain2-poisoned-cache/.npm-cache/test.resolve.npm
          
          echo "=== Cache File Permissions (VULNERABLE) ==="
          ls -la chain2-poisoned-cache/.npm-cache/test.resolve.npm
          stat -c "Mode: %a (%A)" chain2-poisoned-cache/.npm-cache/test.resolve.npm
          
          echo ""
          echo "⚠️  VULN: Cache file is world-readable (0644)"
          echo "      Attacker can read authentication tokens"
      
      - name: "Step 3: Simulate cache poisoning attack"
        run: |
          echo "=== Cache Poisoning Scenario ==="
          echo ""
          echo "Attacker's timeline:"
          echo "1. Modifies cache file with false vulnerability data"
          echo "2. Scanner loads poisoned cache"
          echo "3. False negatives: vulnerable packages marked as safe"
          echo "4. Vulnerable code shipped to production"
          echo ""
          
          # Show what a poisoned cache could contain
          mkdir -p chain2-poisoned-cache/.npm-cache
          cat > chain2-poisoned-cache/.npm-cache/poisoned-data.json << 'POISON'
          {
            "vulnerabilities": [],
            "maliciousNote": "This cache was poisoned to hide vulnerabilities",
            "hiddenVulnerabilities": [
              {
                "package": "express",
                "version": "3.11.0",
                "vulnerability": "Remote Code Execution",
                "cve": "CVE-2019-5413",
                "severity": "CRITICAL",
                "status": "HIDDEN_BY_ATTACKER"
              }
            ]
          }
          POISON
          
          cat chain2-poisoned-cache/.npm-cache/poisoned-data.json
      
      - name: "Step 4: Run osv-scanner with cache - demonstrates false negatives"
        run: |
          cd chain2-poisoned-cache
          echo "=== Running osv-scanner (would use poisoned cache) ==="
          /home/bisht/osv-scanner/osv-scanner scan source -r . 2>&1 || true
          
          echo ""
          echo "Result: If cache was poisoned, vulnerable packages (express 3.11.0)"
          echo "         would NOT be flagged as vulnerable"
          echo ""
          echo "Impact: Vulnerable code ships to production ❌"
      
      - name: "Step 5: Show actual vulnerabilities that would be hidden"
        run: |
          echo "=== Express 3.11.0 Known Vulnerabilities ==="
          echo ""
          echo "CVE-2019-5413: HTTP Response Splitting"
          echo "  - Severity: CRITICAL"
          echo "  - Status: Would be hidden by poisoned cache"
          echo ""
          echo "CVE-2018-16487: Regular Expression Denial of Service"
          echo "  - Severity: MEDIUM"
          echo "  - Status: Would be hidden by poisoned cache"
          echo ""
          echo "⚠️  Without cache poisoning, osv-scanner correctly identifies these."
          echo "    With cache poisoning, they become false negatives."

